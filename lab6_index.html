<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab 6 - API Integration</title>

    <link rel="stylesheet" href="lab6_styles.css">
    <link rel="shortcut icon" href="https://assets.pokemon.com/static2/_ui/img/favicon.ico" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,700" rel="stylesheet" type="text/css" />
    <link href='https://fonts.googleapis.com/css?family=Montserrat' rel='stylesheet'>
</head>

<body>
    <div class="bg">

    </div>
    <div class="content">
        <nav class="navigation-bar">
            <div class="navigation-logo">
                <img class="logo" src="images/logo.png">
                <h3 id="gen-title">Generation 1 Pokemon</h3>
                <select id="gen-select">
                    <option value="0">ALL</option>
                    <option value="1" selected>Generation 1</option>
                    <option value="2">Generation 2</option>
                    <option value="3">Generation 3</option>
                    <option value="4">Generation 4</option>
                    <option value="5">Generation 5</option>
                    <option value="6">Generation 6</option>
                    <option value="7">Generation 7</option>
                    <option value="8">Generation 8</option>
                    <option value="9">Generation 9</option>
                </select>
            </div>

            <div class="navigation-search">
                <!-- Type Filter Select -->
                <select id="type-select">
                    <option value="" disabled selected hidden>Select type</option>
                    <option value="normal">Normal</option>
                    <option value="fire">Fire</option>
                    <option value="water">Water</option>
                    <option value="electric">Electric</option>
                    <option value="grass">Grass</option>
                    <option value="ice">Ice</option>
                    <option value="fighting">Fighting</option>
                    <option value="poison">Poison</option>
                    <option value="ground">Ground</option>
                    <option value="flying">Flying</option>
                    <option value="psychic">Psychic</option>
                    <option value="bug">Bug</option>
                    <option value="rock">Rock</option>
                    <option value="ghost">Ghost</option>
                    <option value="dragon">Dragon</option>
                    <option value="dark">Dark</option>
                    <option value="steel">Steel</option>
                    <option value="fairy">Fairy</option>
                </select>

                <input type="text" id="search-id" placeholder="Enter Pokemon Name or ID"><br>
            </div>
        </nav>

        <div id="loading" class="loading">Loading Pokémon...</div>

        <section class="pokemon-grid" id="pokemonGrid"></section>

        <script src="lab6_scripts.js"></script>

        <footer class="footer">
            <hr>
            <p>© 2026 Pokedex [CMSC 126] | Educational Project</p>

            <p>
                Pokémon and all related names, images, and media are trademarks of
                © Nintendo, Creatures Inc., and Game Freak Inc.
            </p>

            <p>
                No copyright infringement intended. Data provided by
                <a href="https://pokeapi.co/" target="_blank">PokéAPI</a>.
            </p>
        </footer>
    </div>
</body>

</html>
